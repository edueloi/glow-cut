server {
    server_name agendelle.com.br www.agendelle.com.br;

    root /var/www/agendelle/dist;
    index index.html;

    # ── Gzip compression ─────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── Upload limit ─────────────────────────────────
    client_max_body_size 20m;

    # ── Uploads — servir arquivos salvos pelo servidor ──
    location ^~ /uploads/ {
        alias /root/agendelle/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Cache para assets estáticos ──────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API — proxy para Express ─────────────────────
    location /api/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Rotas do React: servir arquivo estático se existir, senão proxy p/ Express ──
    # O Express injeta SEO nas rotas públicas (/, /blog, /blog/:slug, /agendar/:slug, /:slug)
    # e retorna index.html para todas as demais (React Router cuida no cliente)
    location / {
        try_files $uri $uri/ @proxy;
    }

    location @proxy {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── SSL gerenciado pelo Certbot ───────────────────
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/agendelle.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agendelle.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name agendelle.com.br www.agendelle.com.br;
    return 301 https://$host$request_uri;
}
